spring.application.name=monitor-gen-resumen
server.port=8083

# Kafka Bootstrap Servers
spring.kafka.bootstrap-servers=localhost:29092,localhost:39092,localhost:49092

# ============================
# Oracle Cloud Autonomous DB
# ============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@tcps://adb.sa-santiago-1.oraclecloud.com:1522/XXXXXXXX_high?TNS_ADMIN=/wallet}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ADMIN}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tu_password_aqui}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
