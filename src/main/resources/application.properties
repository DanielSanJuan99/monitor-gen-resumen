spring.application.name=monitor-gen-resumen
server.port=8083

# Kafka Bootstrap Servers (override via env SPRING_KAFKA_BOOTSTRAP_SERVERS)
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092,localhost:39092,localhost:49092}

# ============================
# Oracle Cloud Autonomous DB via Wallet
# Las variables se leen desde el archivo .env o variables de entorno
# ============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@bdbusesred_medium?TNS_ADMIN=${ORACLE_WALLET_LOCATION}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ADMIN}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.OracleDialect}

# Configuracion del pool de conexiones HikariCP
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ruta donde se generan los archivos JSON de resumenes
app.resumenes.json.path=${APP_RESUMENES_JSON_PATH:resumenes-json}
