spring.application.name=monitor-gen-resumen
server.port=8083

# Kafka Bootstrap Servers (override via env SPRING_KAFKA_BOOTSTRAP_SERVERS en Docker)
spring.kafka.bootstrap-servers=localhost:29092,localhost:39092,localhost:49092

# ============================
# Perfil H2 para desarrollo local
# Comentar estas lineas y descomentar las de Oracle para produccion
# ============================
spring.datasource.url=jdbc:h2:mem:monitordb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================
# Perfil Oracle Cloud Autonomous DB (descomentar para produccion)
